name: Mirror GitHub Release to Gitee

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Published GitHub Release tag (v<SemVer>)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: gitee-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  mirror-release:
    name: Mirror published assets to Gitee
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TAG: ${{ inputs.tag }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITEE_REPOSITORY: optimistic-little-sunspot/hr-toolkit
      GITEE_USERNAME: optimistic-little-sunspot
    steps:
      - name: Check out latest release tooling from main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Check out requested tagged source for version validation
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ inputs.tag }}
          path: tagged-source

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate requested tag and source version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          python scripts/generate_release_metadata.py \
            --version "${VERSION}" \
            --tag "${TAG}" \
            --project-version-file tagged-source/hr_toolkit/__init__.py \
            --check-only
          echo "SOURCE_COMMIT=$(git rev-parse HEAD)" >> "${GITHUB_ENV}"
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Require Gitee release credential
        shell: bash
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${GITEE_TOKEN}" ]]; then
            echo "Missing required GitHub Actions Secret: GITEE_TOKEN" >&2
            exit 1
          fi

      - name: Download the published GitHub Release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$(gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json isDraft --jq .isDraft)" = "false"
          mkdir -p gitee-release-assets
          gh release download "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir gitee-release-assets

      - name: Regenerate and validate Gitee-first metadata
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_release_metadata.py \
            --version "${VERSION}" \
            --tag "${TAG}" \
            --repository "${GITHUB_REPOSITORY}" \
            --project-version-file tagged-source/hr_toolkit/__init__.py \
            --assets-dir gitee-release-assets \
            --notes "HR Toolkit v${VERSION}" \
            --download-base-url "https://gitee.com/${GITEE_REPOSITORY}/releases/download" \
            --release-url "https://gitee.com/${GITEE_REPOSITORY}/releases/tag/${TAG}" \
            --fallback-download-base-url "https://github.com/${GITHUB_REPOSITORY}/releases/download"
          python scripts/publish_gitee_release.py \
            --version "${VERSION}" \
            --tag "${TAG}" \
            --repository "${GITEE_REPOSITORY}" \
            --target-commitish "$(git rev-parse "${TAG}^{commit}")" \
            --assets-dir gitee-release-assets \
            --dry-run

      - name: Fast-forward source and annotated tag to Gitee
        shell: bash
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GIT_TERMINAL_PROMPT: "0"
        run: |
          set -euo pipefail
          ASKPASS_PATH="${RUNNER_TEMP}/gitee-askpass.sh"
          cat > "${ASKPASS_PATH}" <<'SH'
          #!/bin/sh
          case "$1" in
            *Username*) printf '%s\n' "${GITEE_USERNAME}" ;;
            *Password*) printf '%s\n' "${GITEE_TOKEN}" ;;
            *) exit 1 ;;
          esac
          SH
          chmod 700 "${ASKPASS_PATH}"
          export GIT_ASKPASS="${ASKPASS_PATH}"

          git remote add gitee "https://gitee.com/${GITEE_REPOSITORY}.git"
          git fetch origin refs/heads/main:refs/remotes/origin/main
          git fetch gitee refs/heads/main:refs/remotes/gitee/main

          TAG_COMMIT="$(git rev-parse "${TAG}^{commit}")"
          test "$(git rev-parse refs/remotes/origin/main)" = "${SOURCE_COMMIT}"
          git merge-base --is-ancestor "${TAG_COMMIT}" "${SOURCE_COMMIT}"
          git merge-base --is-ancestor refs/remotes/gitee/main "${SOURCE_COMMIT}"

          REMOTE_TAG="$(git ls-remote gitee "refs/tags/${TAG}" | awk '{print $1}')"
          LOCAL_TAG="$(git rev-parse "refs/tags/${TAG}")"
          if [[ -n "${REMOTE_TAG}" && "${REMOTE_TAG}" != "${LOCAL_TAG}" ]]; then
            echo "Gitee tag ${TAG} already exists at a different object" >&2
            exit 1
          fi

          git -c http.postBuffer=1073741824 -c http.version=HTTP/1.1 \
            push --atomic gitee \
            "${SOURCE_COMMIT}:refs/heads/main" \
            "refs/tags/${TAG}:refs/tags/${TAG}"

      - name: Publish and verify public Gitee Release assets
        shell: bash
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -euo pipefail
          python scripts/publish_gitee_release.py \
            --version "${VERSION}" \
            --tag "${TAG}" \
            --repository "${GITEE_REPOSITORY}" \
            --target-commitish "$(git rev-parse "${TAG}^{commit}")" \
            --assets-dir gitee-release-assets \
            --upload-transport curl \
            --timeout 600
